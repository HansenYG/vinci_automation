# Render blueprint for the Vinci Automation production backend.
# Deploy: push to GitHub `main` branch; Render auto-deploys via this blueprint.
# Fill the `sync: false` secrets in the Render dashboard (never commit them).
services:
  - type: web
    name: vinci-automation-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false            # e.g. https://your-app.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WATI_API_URL
        sync: false
      - key: WATI_ACCESS_TOKEN
        sync: false
      - key: WATI_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_WHATSAPP
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false            # a hosted Ollama endpoint, or disable chatbot
      - key: OLLAMA_MODEL
        value: llama3.1
      - key: ENABLE_SCHEDULER
        value: "false"

  # Optional: fire the reminder / re-blast sweep once an hour.
  # Prefer this over ENABLE_SCHEDULER on Render's free web tier (which sleeps).
  - type: cron
    name: vinci-reminder-sweep
    runtime: docker
    schedule: "0 * * * *"      # hourly
    dockerCommand: sh -c 'curl -fsS -X POST "$API_URL/api/scheduling/run-due-reminders?token=$TRIGGER_TOKEN"'
    envVars:
      - key: API_URL
        sync: false            # https://vinci-automation-api.onrender.com
      - key: TRIGGER_TOKEN
        sync: false            # same value as WATI_WEBHOOK_SECRET
